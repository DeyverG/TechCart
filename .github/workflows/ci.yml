name: CI/CD Pipeline

on:
  push:
    branches:
      - develop

  pull_request:
    branches:
      - develop

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-and-unit-tests:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Checkout completo requerido para SonarCloud
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node.js con cache nativa npm
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Instalación limpia
      - name: Install Dependencies
        run: npm ci

      # Linter opcional
      - name: Run Linter
        run: npm run lint --if-present

      # Tests unitarios + coverage
      - name: Run Unit Tests with Coverage
        run: npm run test:coverage

      # SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true

  e2e-tests:
    name: End-to-End Tests (Playwright)
    needs: quality-and-unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      # Obtener versión de Playwright
      - name: Get Playwright Version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      # Cache moderno y compatible
      - name: Cache Playwright Browsers
        uses: actions/cache@v4.2.0
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # Instalar navegadores y dependencias
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Ejecutar E2E
      - name: Run Playwright E2E Tests
        run: npm run test:e2e

      # Subir reportes
      - name: Upload Playwright Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30