# Clave única del proyecto en SonarCloud. Debe coincidir con la configurada en la plataforma.
sonar.projectKey=techcart-project

# Nombre de la organización en SonarCloud donde reside el proyecto.
sonar.organization=techcart-org

# Nombre descriptivo del proyecto para la interfaz de SonarCloud.
sonar.projectName=TechCart

# Directorio base de los archivos fuente que serán analizados.
sonar.sources=src

# Exclusiones de archivos que no deben considerarse para métricas de código principal ni duplicados.
# Se excluyen los tests unitarios y archivos de definición/configuración para no distorsionar las métricas.
sonar.exclusions=**/__tests__/**, **/*.test.ts, **/*.test.tsx, **/*.d.ts

# Directorio que contiene las pruebas unitarias. SonarCloud catalogará estos archivos como código de test.
sonar.tests=src
sonar.test.inclusions=**/__tests__/**, **/*.test.ts, **/*.test.tsx

# Ruta al archivo de reporte de cobertura en formato LCOV generado por Jest.
# Es fundamental que esta ruta coincida exactamente con la salida de Jest configurada.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Codificación de caracteres estándar para evitar problemas con tildes o caracteres especiales.
sonar.sourceEncoding=UTF-8
